<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebas Desk</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="left">
        <img src="assets/blink05.jpg" id="sebas">

        <div id="message">
            ……来たか。おい、早々に顔を触るんじゃない。
        </div>
    </div>

    <div class="right">

        <h1>Sebas Desk</h1>

        <div class="clock-card">
            <div class="line"></div>
            <div id="city">Madrid</div>
            <div id="clock"></div>
            <div id="date"></div>
            <div class="line"></div>
        </div>

        <div id="weather-card">
            <div id="weather-icon">☁</div>
            <div id="temperature">--℃</div>
            <div id="pressure">---- hPa</div>
            <div id="humidity">--%</div>
        </div>

        <div class="mood-box">
            <h2>Today's Condition</h2>

            <div id="moodQuestion">今日はどうだ。</div>

            <div class="mood-buttons">
                <button class="mood-btn" data-mood="good">元気</button>
                <button class="mood-btn" data-mood="normal">普通</button>
                <button class="mood-btn" data-mood="tired">少し疲れてる</button>
                <button class="mood-btn" data-mood="veryTired">かなり疲れてる</button>
                <button class="mood-btn" data-mood="headache">頭痛がある</button>
                <button class="mood-btn" data-mood="low">気分が沈んでる</button>
            </div>

            <div id="todayOrder">今日の司令：未設定</div>
            <div id="trainingSuggestion">運動メニュー：未設定</div>
        </div>

        <div id="timer">25:00</div>

        <div class="focus-box">
            <div class="focus-title">Today's Focus</div>
            <div id="focusTime">00:00:00</div>
            <div id="pomodoroDisplay">0 Pomodoro</div>
        </div>

        <div class="buttons">
            <button id="start">作業開始</button>
            <button id="pause">一時停止</button>
            <button id="reset">リセット</button>
        </div>

        <button id="summaryButton">今日の総括</button>

        <div class="task-box">
            <h2>Today's Tasks</h2>

            <div class="task-input">
                <input type="text" id="taskInput" placeholder="タスクを入力">
                <button id="addTask">追加</button>
            </div>

            <ul id="taskList"></ul>
        </div>

        <div class="sleep-box">
            <h2>Sleep Record</h2>

            <div class="sleep-time">
                <div id="sleepTimer">00:00:00</div>
                <div id="sleepStatus">まだ記録していません</div>
            </div>

            <div class="sleep-buttons">
                <button id="sleepStart">寝る</button>
                <button id="sleepStop">起きた</button>
                <button id="sleepReset">睡眠リセット</button>
            </div>

            <div id="sleepLastRecord">前回の睡眠：--</div>
        </div>

        <div class="memory-box">
            <h2>Sebas Memory</h2>

            <div class="memory-input">
                <input type="text" id="memoryInput" placeholder="セバスに覚えておいてほしいこと">
                <button id="addMemory">記憶</button>
            </div>

            <ul id="memoryList"></ul>
        </div>

    </div>

</div>

<script src="message.js"></script>
<script src="sound.js?v=12"></script>
<script src="timer.js?v=3"></script>
<script src="tasks.js"></script>
<script src="sleep.js?v=5"></script>
<script src="mood.js?v=2"></script>
<script src="memory.js"></script>
<script src="weather.js"></script>
<script src="clock.js"></script>
<script src="blink.js"></script>
<script src="main.js"></script>

</body>
</html>
